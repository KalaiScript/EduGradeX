<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | CGPA Calculator</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="theme-color" content="#2f80ed">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body style="justify-content: center; align-items: center;">

    <div class="container" style="max-width: 400px;">
        <div class="card" style="text-align: center; padding: 40px 30px;">
            <h1 style="color: var(--primary-color); margin-bottom: 10px;">Welcome Back</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px;">Enter your details to access
                the portal</p>

            <form id="login-form">
                <div style="margin-bottom: 20px; text-align: left;">
                    <label
                        style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; display: block;">Student
                        Name</label>
                    <input type="text" id="login-name" placeholder="Name" required>
                </div>

                <div style="margin-bottom: 30px; text-align: left;">
                    <label style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; display: block;">Roll
                        Number</label>
                    <input type="text" id="login-roll" placeholder="e.g. 24CS100" required>
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    Login
                </button>
            </form>

            <p id="login-msg" style="margin-top: 15px; font-size: 0.85rem; color: #ff5252; min-height: 20px;"></p>
        </div>
    </div>

    <!-- Type Module for Firebase Imports -->
    <script type="module">
        import { loginStudent } from './firebase-config.js';

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const msg = document.getElementById('login-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('login-name').value.trim();
            const roll = document.getElementById('login-roll').value.trim();

            if (!name || !roll) {
                msg.textContent = "Please fill in all fields";
                return;
            }

            // UI Loading
            loginBtn.textContent = "Verifying...";
            loginBtn.disabled = true;
            msg.textContent = "";

            try {
                const success = await loginStudent(name, roll);
                if (success) {
                    msg.style.color = "var(--accent-green)";
                    msg.textContent = "Login Successful! Redirecting...";
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    msg.style.color = "#ff5252";
                    msg.textContent = "Access Denied: login failed.";
                    loginBtn.textContent = "Login";
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                msg.style.color = "#ff5252";
                msg.textContent = "Connection Error. Check console.";
                loginBtn.textContent = "Login";
                loginBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
