<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | CGPA Master</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#2f80ed">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="admin-page">

    <div class="container"
        style="display: flex; flex-direction: column; justify-content: center; min-height: 80vh; max-width: 400px; margin: 0 auto;">

        <div style="margin-bottom: 20px;">
            <a href="index.html" style="color: var(--text-muted);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
        </div>

        <div class="card" style="text-align: center; padding: 40px 20px;">
            <div style="margin-bottom: 20px; color: var(--primary-color);">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h2 style="margin-bottom: 5px;">ADMIN ACCESS</h2>


            <form id="login-form" onsubmit="handleLogin(event)" autocomplete="off">
                <div style="text-align: left; margin-bottom: 15px;">
                    <label style="font-size: 0.8rem; color: var(--text-muted);">Name</label>
                    <input type="text" id="admin-name" placeholder="Enter admin name" autocomplete="username">
                </div>

                <div style="text-align: left; margin-bottom: 25px;">
                    <label style="font-size: 0.8rem; color: var(--text-muted);">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="admin-pass" placeholder="••••••••" autocomplete="new-password"
                            style="padding-right: 40px; width: 100%;">
                        <button type="button" onmousedown="showPassword()" onmouseup="hidePassword()"
                            onmouseleave="hidePassword()"
                            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; padding: 5px;">
                            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3" fill="none"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">LOG IN <span style="margin-left:5px;">→</span></button>
            </form>

            <a href="#" onclick="showForgotPassword(); return false;"
                style="display: block; margin-top: 20px; font-size: 0.8rem; color: var(--primary-color);">Forgot
                Password?</a>
        </div>

        <!-- Forgot Password Modal -->
        <div id="forgot-pass-modal"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 9999; justify-content: center; align-items: center;">
            <div
                style="background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px; max-width: 400px; margin: 20px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6);">
                <div style="color: var(--primary-color); margin-bottom: 20px;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                </div>
                <h3 style="margin-bottom: 15px;">Admin Credentials</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px;">Default admin login
                    details:</p>
                <div
                    style="background: rgba(47, 128, 237, 0.1); border: 1px solid var(--primary-color); border-radius: 10px; padding: 20px; margin-bottom: 25px; text-align: left;">
                    <p style="color: var(--text-main); font-size: 0.9rem; margin: 0;">
                        Please contact the system administrator to reset your password.
                    </p>
                </div>
                <button onclick="closeForgotPassword()" class="btn btn-primary" style="width: 100%;">Got It!</button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 0.7rem; opacity: 0.5;">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right: 4px;">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            AUTHORIZED PERSONNEL ONLY
        </div>

    </div>

    <script type="module">
        import { loginAdmin } from './firebase-config.js';

        window.handleLogin = async function (e) {
            e.preventDefault();
            const name = document.getElementById('admin-name').value.trim();
            const pass = document.getElementById('admin-pass').value.trim();
            const btn = document.querySelector('button[type="submit"]');

            if (!name || !pass) {
                alert("Please enter both username and password.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Verifying...';

            try {
                const success = await loginAdmin(name, pass);
                if (success) {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Invalid Credentials!');
                    btn.disabled = false;
                    btn.innerHTML = 'LOG IN <span style="margin-left:5px;">→</span>';
                }
            } catch (error) {
                console.error(error);
                alert("Login failed. Check console.");
                btn.disabled = false;
                btn.innerHTML = 'LOG IN <span style="margin-left:5px;">→</span>';
            }
        }

        window.showPassword = function () {
            const passInput = document.getElementById('admin-pass');
            const eyeIcon = document.getElementById('eye-icon');
            passInput.type = 'text';
            // Eye-off icon with consistent styling
            eyeIcon.setAttribute('fill', 'none');
            eyeIcon.setAttribute('stroke', 'white');
            eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" fill="none"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        }

        window.hidePassword = function () {
            const passInput = document.getElementById('admin-pass');
            const eyeIcon = document.getElementById('eye-icon');
            passInput.type = 'password';
            // Eye-on icon with consistent styling
            eyeIcon.setAttribute('fill', 'none');
            eyeIcon.setAttribute('stroke', 'white');
            eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none"></path><circle cx="12" cy="12" r="3" fill="none"></circle>';
        }

        window.showForgotPassword = function () {
            document.getElementById('forgot-pass-modal').style.display = 'flex';
        }

        window.closeForgotPassword = function () {
            document.getElementById('forgot-pass-modal').style.display = 'none';
        }
    </script>
</body>

</html>
