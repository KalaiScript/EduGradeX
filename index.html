<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGradeX </title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link rel="apple-touch-icon" href="apple-touch-icon.jpg">
    <meta name="theme-color" content="#2f80ed">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <!-- Main Card -->
        <div class="card landing-card">
            <div class="logout-btn-wrapper">
                <button id="logout-btn" class="btn btn-secondary logout-btn">Logout</button>
            </div>

            <div class="header-bg" style="text-align: center; margin-bottom: 2rem;">
                <h1 class="page-title" style="margin-bottom: 0.5rem;">EduGradeX</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Welcome, <span id="user-display-name"
                        style="color: var(--primary-color); font-weight: bold;">Student</span></p>
                
                <!-- Quick Stats -->
                <div id="user-quick-stats" style="margin-top: 10px; display: none;">
                    <span id="user-roll-display" style="font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 10px;">Roll No: ---</span>
                </div>

                <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 5px;">Select your semester to begin</p>
            </div>

            <script>
                // Auth Check
                const userSession = sessionStorage.getItem('res_user');
                if (!userSession) {
                    window.location.href = 'login.html';
                } else {
                    const user = JSON.parse(userSession);
                    document.getElementById('user-display-name').textContent = user.name;
                    if (user.rollNo) {
                        document.getElementById('user-quick-stats').style.display = 'block';
                        document.getElementById('user-roll-display').textContent = `Roll No: ${user.rollNo}`;
                    }
                }

                document.getElementById('logout-btn').onclick = () => {
                    sessionStorage.removeItem('res_user');
                    window.location.href = 'login.html';
                };
            </script>

            <!-- Semester Grid -->
            <div class="sem-grid">
                <button class="sem-btn" onclick="selectSemester(1)">1st Sem</button>
                <button class="sem-btn" onclick="selectSemester(2)">2nd Sem</button>
                <button class="sem-btn" onclick="selectSemester(3)">3rd Sem</button>
                <button class="sem-btn" onclick="selectSemester(4)">4th Sem</button>
                <button class="sem-btn" onclick="selectSemester(5)">5th Sem</button>
                <button class="sem-btn" onclick="selectSemester(6)">6th Sem</button>
                <button class="sem-btn" onclick="selectSemester(7)">7th Sem</button>
                <button class="sem-btn" onclick="selectSemester(8)">8th Sem</button>
            </div>

            <!-- Total CGPA Section (Optional Quick Calc) -->
            <div style="margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                <h3 style="color: var(--primary-color); margin-bottom: 15px;">Total CGPA</h3>
                <div style="display: flex; gap: 10px; align-items: center; justify-content: space-between;">
                    <span style="font-size: 1.2rem; font-weight: bold; color: var(--text-main);">Final Score = </span>
                    <span id="total-cgpa-display"
                        style="font-size: 1.5rem; font-weight: bold; color: var(--accent-green);">0.00</span>
                    <span style="font-size: 1rem; color: var(--text-muted); margin-left: 4px;">/ 10.00</span>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="window.location.href='history.html'">View History</button>
                    <button class="btn btn-secondary" onclick="window.location.href='target.html'"
                        style="border-color: var(--primary-color); color: var(--primary-color);">Target Calc</button>
                </div>
                <div style="margin-top: 15px;">
                    <button class="btn btn-primary" onclick="window.location.href='ai-predictor.html'"
                        style="background: linear-gradient(90deg, #bb86fc, #2f80ed); border: none; font-size: 0.95rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                        AI Predictor & Insights
                    </button>
                </div>
                <div style="margin-top: 15px;">
                    <button class="btn btn-secondary" style="width: 100%; border-color: #ff5252; color: #ff5252;"
                        onclick="resetApp()">Reset All Data</button>
                </div>
            </div>
        </div>


    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
