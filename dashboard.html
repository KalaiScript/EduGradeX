<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Manager | CGPA Master</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#2f80ed">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="assets/libs/html2pdf.bundle.min.js"></script>

</head>

<body class="dashboard-page">

    <div class="container">
        <!-- Header -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <a href="admin.html" style="color: var(--text-muted);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div style="text-align: center;">
                <h2 style="margin: 0; font-size: 1.1rem;">Subject Manager</h2>
            </div>
            <a href="index.html" style="color: var(--text-muted);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </a>
        </div>

        <!-- View Toggle -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn btn-primary" onclick="showSection('results')" id="btn-results">Student Results</button>
            <button class="btn btn-secondary" onclick="showSection('subjects')" id="btn-subjects">Manage
                Subjects</button>
        </div>

        <!-- Student Results Section -->
        <div id="section-results">
            <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px;">
                <h3 style="font-size: 1rem; margin: 0;">Live Student Data</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <!-- Filter: Year -->
                    <select id="filter-year" onchange="loadResults()"
                        style="padding: 8px; border-radius: 6px; border: 1px solid var(--glass-border); background: var(--card-bg); color: var(--text-main); font-size: 0.8rem;">
                        <option value="">All Years</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                    <!-- Filter: Section -->
                    <select id="filter-section" onchange="loadResults()"
                        style="padding: 8px; border-radius: 6px; border: 1px solid var(--glass-border); background: var(--card-bg); color: var(--text-main); font-size: 0.8rem;">
                        <option value="">All Sections</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="E">E</option>
                    </select>
                    <button onclick="loadResults()" class="btn btn-secondary"
                        style="width: auto; padding: 8px 15px; font-size: 0.8rem;">Refresh</button>

                    <button onclick="downloadCSV()" class="btn btn-primary"
                        style="width: auto; padding: 8px 15px; font-size: 0.8rem;">CSV</button>
                    <button onclick="downloadPDF()" class="btn btn-primary"
                        style="width: auto; padding: 8px 15px; font-size: 0.8rem;">PDF</button>
                </div>
            </div>

            <div class="card" style="padding: 0; overflow: hidden;">
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                        <thead>
                            <tr style="background: rgba(255,255,255,0.05); text-align: left;">
                                <th style="padding: 15px; color: var(--text-muted);">Name</th>
                                <th style="padding: 15px; color: var(--text-muted);">Roll No</th>
                                <th style="padding: 15px; color: var(--text-muted);">Year</th>
                                <th style="padding: 15px; color: var(--text-muted);">Section</th>
                                <th style="padding: 15px; color: var(--text-muted);">Semester</th>
                                <th style="padding: 15px; color: var(--text-muted);">SGPA</th>
                                <th style="padding: 15px; color: var(--text-muted);">CGPA</th>
                                <th style="padding: 15px; color: var(--text-muted);">Last Updated</th>
                            </tr>
                        </thead>
                        <tbody id="results-table-body">
                            <tr>
                                <td colspan="5" style="padding: 20px; text-align: center; color: var(--text-muted);">
                                    Loading live data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Subject Manager Section (Existing) -->
        <div id="section-subjects" style="display: none;">
            <!-- Header -->
            <div class="card">
                <h3 style="margin-bottom: 15px; font-size: 1rem;" id="form-title">Add New Subject</h3>
                <input type="hidden" id="edit-index" value="-1">

                <div style="margin-bottom: 15px;">
                    <label style="font-size: 0.8rem; color: var(--text-muted);">Subject Name / Code</label>
                    <input type="text" id="new-subj-name" placeholder="e.g. Professional English (HS3151)">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="font-size: 0.8rem; color: var(--text-muted);">Credit Value</label>
                    <select id="new-subj-credit">
                        <option value="1">1 Credit</option>
                        <option value="2">2 Credits</option>
                        <option value="3" selected>3 Credits</option>
                        <option value="4">4 Credits</option>
                        <option value="12">12 Credits</option>
                    </select>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="font-size: 0.8rem; color: var(--text-muted);">Semester</label>
                    <select id="new-subj-sem" onchange="loadAdminSubjects()">
                        <option value="" disabled selected>Select Semester</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                    </select>
                </div>

                <button id="save-btn" class="btn btn-primary" onclick="saveSubject()">
                    Add to Registry
                </button>
                <button id="cancel-btn" class="btn" onclick="resetForm()"
                    style="display: none; background: transparent; border: 1px solid var(--border-color); margin-top: 10px;">
                    Cancel Edit
                </button>
            </div>

            <!-- List Header -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="font-size: 1rem;">Managing Semester <span id="current-view-sem">3</span></h3>
                <span style="font-size: 0.8rem; color: var(--text-muted);" id="subject-count">0 Subjects</span>
            </div>

            <!-- Dynamic List -->
            <div id="admin-subject-list"
                style="display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px;">
                <!-- Rendered via JS -->
            </div>

        </div>

        <!-- Load script.js first to get access to getSubjects and saveSemesterSubjects -->
        <script type="module" src="script.js"></script>

        <script type="module">
            import { getAllStudentResults } from './firebase-config.js';

            // --- Export Functions ---

            window.downloadCSV = function () {
                const table = document.querySelector('table');
                let rows = Array.from(table.querySelectorAll('tr'));

                // Helper to quote strings
                const q = (s) => `"${(s || '').toString().replace(/"/g, '""')}"`;

                const csvContent = rows.map(row => {
                    const cells = Array.from(row.querySelectorAll('th, td'));
                    return cells.map(cell => q(cell.innerText)).join(',');
                }).join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `student_data_export_${new Date().toISOString().slice(0, 10)}.csv`;
                link.click();
            }

            window.downloadPDF = function () {
                // Check if library is loaded (on window)
                if (!window.html2pdf) {
                    alert('PDF library not loaded. Please wait or refresh.');
                    return;
                }

                // Create a temporary container for clean PDF generation
                const container = document.createElement('div');
                container.style.padding = "20px";
                container.style.background = "white";
                container.style.color = "black";
                container.style.width = "100%";

                // Add Title
                const title = document.createElement('h2');
                title.textContent = "Student Data Report";
                title.style.fontFamily = "sans-serif";
                title.style.textAlign = "center";
                title.style.marginBottom = "5px";

                // Add Date
                const date = document.createElement('p');
                date.textContent = `Generated on: ${new Date().toLocaleString()}`;
                date.style.fontFamily = "sans-serif";
                date.style.textAlign = "center";
                date.style.fontSize = "0.8rem";
                date.style.marginBottom = "20px";

                // Clone the table
                const originalTable = document.querySelector('table');
                if (!originalTable) {
                    alert("No data table found to export.");
                    return;
                }
                const table = originalTable.cloneNode(true);

                // Style table for PDF specifically
                table.style.width = "100%";
                table.style.borderCollapse = "collapse";
                table.style.fontSize = "10px"; // Smaller font for PDF to fit columns

                // Force styling on headers and cells for PDF renderer
                table.querySelectorAll('th').forEach(th => {
                    th.style.backgroundColor = "#2f80ed";
                    th.style.color = "#ffffff";
                    th.style.padding = "6px";
                    th.style.border = "1px solid #ccc";
                    th.style.fontSize = "10px";
                });

                table.querySelectorAll('td').forEach(td => {
                    td.style.backgroundColor = "#ffffff";
                    td.style.color = "#000000";
                    td.style.padding = "6px";
                    td.style.border = "1px solid #ccc";
                    td.style.fontSize = "10px";
                });

                container.appendChild(title);
                container.appendChild(date);
                container.appendChild(table);

                // Use html2pdf
                const opt = {
                    margin: 10,
                    filename: `student_report_${new Date().toISOString().slice(0, 10)}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
                };

                // New worker-based promise chain
                html2pdf().set(opt).from(container).save().catch(err => {
                    console.error("PDF Export Error:", err);
                    alert("Failed to generate PDF. See console.");
                });
            }

            // --- Auth Logic ---
            if (localStorage.getItem('isAdmin') !== 'true') {
                window.location.href = 'admin.html';
            }

            // Initialize
            document.addEventListener('DOMContentLoaded', () => {
                // Determine start view
                window.showSection('results');
                window.loadResults();
            });

            // 1. View Toggle
            window.showSection = function (section) {
                document.getElementById('section-results').style.display = section === 'results' ? 'block' : 'none';
                document.getElementById('section-subjects').style.display = section === 'subjects' ? 'block' : 'none';

                // Button Styles
                const btnResults = document.getElementById('btn-results');
                const btnSubjects = document.getElementById('btn-subjects');

                if (btnResults && btnSubjects) {
                    if (section === 'results') {
                        btnResults.className = 'btn btn-primary';
                        btnSubjects.className = 'btn btn-secondary';
                        window.loadResults();
                    } else {
                        btnResults.className = 'btn btn-secondary';
                        btnSubjects.className = 'btn btn-primary';
                        if (window.loadAdminSubjects) window.loadAdminSubjects();
                    }
                }
            }

            // 2. Load Results
            window.loadResults = async function () {
                const tbody = document.getElementById('results-table-body');
                if (!tbody) return;

                tbody.innerHTML = '<tr><td colspan="6" style="padding: 20px; text-align: center; color: var(--text-muted);">Loading live data...</td></tr>';

                const students = await getAllStudentResults();

                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="padding: 20px; text-align: center; color: var(--text-muted);">No student data found in Firebase.</td></tr>';
                    return;
                }

                // Apply Filters
                const filterYear = document.getElementById('filter-year').value;
                const filterSection = document.getElementById('filter-section').value;

                const filteredStudents = students.filter(student => {
                    const matchYear = filterYear ? (student.year == filterYear) : true;
                    const matchSection = filterSection ? (student.section == filterSection) : true;
                    return matchYear && matchSection;
                });

                tbody.innerHTML = '';
                if (filteredStudents.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="padding: 20px; text-align: center; color: var(--text-muted);">No students match the selected filters.</td></tr>';
                    return;
                }

                filteredStudents.forEach(student => {
                    const tr = document.createElement('tr');
                    tr.style.borderBottom = '1px solid rgba(255,255,255,0.05)';

                    // date formatting
                    let lastUpdate = '-';
                    if (student.lastUpdated) {
                        const d = new Date(student.lastUpdated);
                        lastUpdate = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }

                    // Calculate Latest Semester & True CGPA (Average of SGPAs)
                    let latestSem = '-';
                    let calculatedCGPA = '0.00';
                    let sgpaDisplay = student.currentCGPA || '0.00'; // Current "CGPA" stored is actually latest SGPA usually

                    if (student.results) {
                        const sems = Object.keys(student.results)
                            .filter(k => k.startsWith('sem_'))
                            .map(k => ({
                                sem: parseInt(k.split('_')[1]),
                                sgpa: parseFloat(student.results[k].sgpa || 0),
                                timestamp: student.results[k].timestamp || ""
                            }));

                        if (sems.length > 0) {
                            // Sort by timestamp descending (newest first)
                            sems.sort((a, b) => {
                                const tA = a.timestamp || "";
                                const tB = b.timestamp || "";
                                return tB.localeCompare(tA);
                            });

                            latestSem = sems[0].sem;
                            sgpaDisplay = sems[0].sgpa.toFixed(2);

                            // Calculate Average SGPA
                            const totalSgpa = sems.reduce((sum, item) => sum + item.sgpa, 0);
                            calculatedCGPA = (totalSgpa / sems.length).toFixed(2);
                        }
                    }

                    tr.innerHTML = `
                        <td style="padding: 15px; color: var(--text-main); font-weight: 500;">${student.name || 'Unknown'}</td>
                        <td style="padding: 15px; color: var(--primary-color); font-family: monospace;">${student.id}</td> <!-- ID is Roll No -->
                        <td style="padding: 15px; color: var(--text-muted);">${student.year ? student.year + ' yr' : '-'}</td>
                        <td style="padding: 15px; color: var(--text-muted);">${student.section ? 'Sec ' + student.section : '-'}</td>
                        <td style="padding: 15px; color: var(--text-muted);">${latestSem}</td>
                        <td style="padding: 15px; color: var(--text-muted);">${sgpaDisplay}</td>
                        <td style="padding: 15px; font-weight: bold; color: var(--accent-green);">${calculatedCGPA}</td>
                        <td style="padding: 15px; color: var(--text-muted); font-size: 0.85rem;">${lastUpdate}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            // --- Subject Manager Logic ---

            // 1. Render Subjects
            window.loadAdminSubjects = function () {
                const sem = document.getElementById('new-subj-sem').value;
                const container = document.getElementById('admin-subject-list');

                if (!sem) {
                    if (container) container.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted); border: 1px dashed var(--border-color); border-radius: 12px;">Please select a semester above to view and manage subjects.</div>';
                    if (document.getElementById('current-view-sem')) document.getElementById('current-view-sem').textContent = "...";
                    if (document.getElementById('subject-count')) document.getElementById('subject-count').textContent = "";
                    return;
                }

                if (document.getElementById('current-view-sem')) document.getElementById('current-view-sem').textContent = sem;

                // Disable "Add" button for Semester 8
                const saveBtn = document.getElementById('save-btn');
                if (saveBtn) {
                    if (sem == 8) {
                        saveBtn.disabled = true;
                        saveBtn.style.opacity = "0.5";
                        saveBtn.style.cursor = "not-allowed";
                        saveBtn.innerText = "Semester 8 is Static";
                    } else {
                        saveBtn.disabled = false;
                        saveBtn.style.opacity = "1";
                        saveBtn.style.cursor = "pointer";
                        saveBtn.innerText = document.getElementById('edit-index').value >= 0 ? "Update Subject" : "Add to Registry";
                    }
                }

                // Use helper from script.js (accessed via window)
                if (window.getSubjects) {
                    const subjects = window.getSubjects(sem);
                    if (document.getElementById('subject-count')) document.getElementById('subject-count').textContent = `${subjects.length} Subjects`;

                    if (container) {
                        container.innerHTML = '';
                        if (subjects.length === 0) {
                            container.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--text-muted);">No subjects found.</div>';
                            return;
                        }

                        subjects.forEach((subj, index) => {
                            const div = document.createElement('div');
                            div.className = 'card';
                            div.style.display = 'flex';
                            div.style.justifyContent = 'space-between';
                            div.style.alignItems = 'center';
                            div.style.padding = '15px';

                            div.innerHTML = `
                                <div style="display: flex; align-items: center; gap: 15px;">
                                    <span style="background-color: var(--card-hover); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; font-size: 0.9rem; color: var(--primary-color);">${subj.credit}</span>
                                    <div>
                                        <h4 style="margin: 0; font-size: 0.9rem;">${subj.name}</h4>
                                        <span style="font-size: 0.7rem; color: var(--text-muted);">${subj.code || 'CODE'}</span>
                                    </div>
                                </div>
                                ${sem == 8 ? '' : `
                                <div style="display: flex; gap: 10px;">
                                    <button onclick="editSubject(${index})" style="background: none; border: none; color: var(--text-muted); cursor: pointer;">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                        </svg>
                                    </button>
                                    <button onclick="deleteSubject(${index})" style="background: none; border: none; color: #ff5252; cursor: pointer;">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        </svg>
                                    </button>
                                </div>`}
                            `;
                            container.appendChild(div);
                        });
                    }
                }
            }

            // 2. Save
            window.saveSubject = function () {
                const sem = document.getElementById('new-subj-sem').value;
                const name = document.getElementById('new-subj-name').value;
                const credit = parseInt(document.getElementById('new-subj-credit').value);
                const index = parseInt(document.getElementById('edit-index').value);

                if (!sem) { alert("Please select a semester first."); return; }
                if (!name) { alert("Please enter a subject name."); return; }

                if (window.getSubjects) {
                    let subjects = window.getSubjects(sem);
                    const newSubj = {
                        name: name,
                        credit: credit,
                        code: name.substring(0, 2).toUpperCase() + 'XXX',
                        sem: parseInt(sem)
                    };

                    if (index >= 0) {
                        subjects[index] = newSubj;
                        alert("Subject updated!");
                    } else {
                        subjects.push(newSubj);
                        alert("Subject added!");
                    }

                    if (window.saveSemesterSubjects) window.saveSemesterSubjects(sem, subjects);
                    window.resetForm();
                    window.loadAdminSubjects();
                }
            }

            // 3. Edit
            window.editSubject = function (index) {
                const sem = document.getElementById('new-subj-sem').value;
                if (window.getSubjects) {
                    const subjects = window.getSubjects(sem);
                    const subj = subjects[index];

                    document.getElementById('new-subj-name').value = subj.name;
                    document.getElementById('new-subj-credit').value = subj.credit;

                    document.getElementById('edit-index').value = index;
                    document.getElementById('form-title').textContent = "Edit Subject";
                    document.getElementById('save-btn').textContent = "Update Subject";
                    document.getElementById('cancel-btn').style.display = 'inline-block';

                    window.scrollTo(0, 0);
                }
            }

            // 4. Delete
            window.deleteSubject = function (index) {
                if (confirm("Are you sure you want to delete this subject?")) {
                    const sem = document.getElementById('new-subj-sem').value;
                    if (window.getSubjects) {
                        let subjects = window.getSubjects(sem);
                        subjects.splice(index, 1);
                        if (window.saveSemesterSubjects) window.saveSemesterSubjects(sem, subjects);
                        window.loadAdminSubjects();
                    }
                }
            }

            // 5. Reset
            window.resetForm = function () {
                document.getElementById('new-subj-name').value = '';
                document.getElementById('new-subj-credit').value = '3';
                document.getElementById('edit-index').value = '-1';

                document.getElementById('form-title').textContent = "Add New Subject";
                document.getElementById('save-btn').textContent = "Add to Registry";
                document.getElementById('cancel-btn').style.display = 'none';
            }
        </script>
</body>

</html>
